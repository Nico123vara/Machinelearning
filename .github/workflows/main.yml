name: Tägliches Aktien Update

on:
  schedule:
    - cron: '0 22 * * 1-5'  # jeden Tag um 22:00 UTC = 00:00 Schweizer Zeit (Werktage)
  workflow_dispatch:          # manuell auslösen möglich

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Libraries installieren
        run: |
          pip install yfinance pandas duckdb scikit-learn xgboost joblib numpy matplotlib

      - name: Daten aktualisieren
        run: |
          cd Main/Aktien-Predictor/notebooks
          python 07_update.py

      - name: Features neu berechnen
        run: |
          cd Main/Aktien-Predictor/notebooks
          python 08_pipeline.py

      - name: Modell neu trainieren
        run: |
          cd Main/Aktien-Predictor/notebooks
          python 09_modellvergleich.py

      - name: Änderungen auf GitHub pushen
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Main/Aktien-Predictor/warehouse/aktien.db
          git add Main/Aktien-Predictor/model/
          git commit -m "Auto-Update: $(date +'%Y-%m-%d')" || echo "Keine Änderungen"
          git push
